name: Setup Development Environment for Copilot

steps:
  # Setup Python environment
  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'
      cache: 'pip'
  
  # Install Python dependencies
  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      pip install -r requirements-dev.txt

  # Create a venv and install project + SQLMesh deps with Fail-Fast pip settings
  - name: Create venv and install project + SQLMesh deps (Fail-Fast)
    run: |
      python3 -m venv .venv
      . .venv/bin/activate
      python -m pip install --upgrade pip
      export PIP_DEFAULT_TIMEOUT=300
      export PIP_RETRIES=10
      PIP_DEFAULT_TIMEOUT=300 PIP_RETRIES=10 \
        pip install -r requirements.txt \
        --prefer-binary --upgrade-strategy only-if-needed --progress-bar off --no-input --disable-pip-version-check
      if [ -f Utilities/SQLMesh/requirements.txt ]; then
        PIP_DEFAULT_TIMEOUT=300 PIP_RETRIES=10 pip install -r Utilities/SQLMesh/requirements.txt --prefer-binary --no-input
      fi
    shell: bash

  - name: Create venv and install project + SQLMesh deps (Windows)
    if: runner.os == 'Windows'
    run: |
      python -m venv .venv
      Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
      .\.venv\Scripts\Activate.ps1
      python -m pip install --upgrade pip
      $env:PIP_DEFAULT_TIMEOUT='300'; $env:PIP_RETRIES='10'
      pip install -r requirements.txt --prefer-binary --upgrade-strategy only-if-needed --progress-bar off --no-input --disable-pip-version-check
      if (Test-Path Utilities/SQLMesh/requirements.txt) { pip install -r Utilities/SQLMesh/requirements.txt --prefer-binary --no-input }
    shell: pwsh

  - name: Verify SQLMesh installation (optional)
    run: |
      . .venv/bin/activate || echo 'activate .venv manually on Windows'
      python -c "import importlib,sys
try:
    m=importlib.import_module('sqlmesh')
    print('sqlmesh', getattr(m,'__version__', 'unknown'))
except Exception as e:
    print('sqlmesh import failed:', e); sys.exit(1)
"
    shell: bash
  
  # Setup PowerShell (for cross-platform support)
  - name: Install PowerShell
    run: |
      if [ "$RUNNER_OS" == "Linux" ]; then
        sudo apt-get update
        sudo apt-get install -y powershell
      fi
    shell: bash
  
  # Setup Node.js (minimal, for package.json)
  - name: Set up Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '18'
  
  - name: Install Rust and Cargo at the OS level (optional)
    run: |
      if ! command -v rustc &> /dev/null; then
        curl https://sh.rustup.rs -sSf | sh -s -- -y
        # Ensure cargo is available in the current and subsequent steps
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        source $HOME/.cargo/env
      fi
    shell: bash
