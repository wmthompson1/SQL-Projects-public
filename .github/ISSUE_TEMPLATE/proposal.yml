name: 💡 Proposal
description: Submit a new idea or initiative
title: "[PROPOSAL] "
labels: ["proposal"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose new ideas, projects, or initiatives.

  - type: input
    id: proposal-title
    attributes:
      label: Proposal Title
      description: What are you proposing?
      placeholder: e.g., "Implement automated data quality checks"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Opportunity
      description: What problem does this solve or what opportunity does it address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you propose we address this?
    validations:
      required: true

  - type: textarea
    id: benefits
    attributes:
      label: Expected Benefits
      description: What are the anticipated benefits?
      placeholder: |
        - Benefit 1
        - Benefit 2
    validations:
      required: true

  - type: textarea
    id: resources
    attributes:
      label: Resources Needed
      description: What would be required to implement this?
      placeholder: |
        - People:
        - Time:
        - Budget:
        - Technology:
    validations:
      required: false

  - type: textarea
    id: timeline
    attributes:
      label: Proposed Timeline
      description: How long would this take to implement?
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this?
      options:
        - Low - nice to have
        - Medium - should do
        - High - important
        - Critical - must do
    validations:
      required: true
