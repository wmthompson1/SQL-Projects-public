name: 💬 Discussion Topic
description: Start a discussion or ask a question
title: "[DISCUSSION] "
labels: ["discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to start a discussion, ask questions, or gather team input.

  - type: input
    id: topic
    attributes:
      label: Topic
      description: What would you like to discuss?
      placeholder: e.g., "Should we standardize our naming conventions?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Background / Context
      description: Provide any relevant background information
      placeholder: Why is this topic important? What prompted this discussion?
    validations:
      required: true

  - type: textarea
    id: questions
    attributes:
      label: Questions for the Team
      description: What specific input or feedback are you looking for?
      placeholder: |
        - Question 1?
        - Question 2?
    validations:
      required: false

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How soon do you need input?
      options:
        - Low - whenever convenient
        - Medium - within a week
        - High - within a few days
        - Critical - ASAP
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Any other details or links?
    validations:
      required: false
