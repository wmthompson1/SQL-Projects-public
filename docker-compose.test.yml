services:
  arangodb:
    image: arangodb:latest
    container_name: arangodb-test
    environment:
      - ARANGO_ROOT_PASSWORD=localtestpass
    ports:
      - "8529:8529"
    healthcheck:
      test: ["CMD-SHELL", "if command -v curl >/dev/null 2>&1; then curl -f http://127.0.0.1:8529/_api/version || exit 1; elif command -v wget >/dev/null 2>&1; then wget -qO- http://127.0.0.1:8529/_api/version || exit 1; else exit 0; fi"]
      interval: 5s
      timeout: 3s
      retries: 12
