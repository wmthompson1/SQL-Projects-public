<h2>Piece #</h2>
<p>The sequence number of the material as it is required for the work order. 
 Engineering master or quotation. This is a number similar to the operation 
 sequence number that, when combined with the Base ID, Sub ID, Lot ID, 
 Split ID, Operation Sequence Number, forms a unique identifier.</p>
