		<h1>Changing the Background Color</h1>
	</div>
	<p>You can change the background color to another color of your choosing.</p>
	<p>To change the background color:</p>
	<ol>
		<li class="p-Numbered"><p class="Numbered">Select <span class="Bold">Maintain</span>, 
		 <span class="Bold">Set Background Color</span>.</p></li>
		<li class="p-Numbered"><p class="Numbered">In the Windows color 
		 picker, select the color to use.</p></li>
		<li class="p-Numbered"><p class="Numbered">Click <span class="Bold">Ok</span>.</p></li>
	</ol>
</div>
