<h2>Include Planned Orders</h2>
<p>Select this check box if you want to include planned orders in the graph. 
 Planned orders exist for planning purposes only; until they attain a released 
 status, work may not begin on them. See the <a href="VMPLNWINWhat.htm">Material 
 Planning Window</a> for more information.</p>
