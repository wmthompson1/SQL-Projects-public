		<h1>About the Excel Format</h1>
	</div>
	<p>You can export forecasts to Microsoft Excel, use the Excel file 
	 to edit the forecast, and then import the forecast back into VISUAL. 
	 In the Microsoft Excel file, you can edit the forecast quantities 
	 and the required/want date for the quantities.</p>
