		<h1>Allocation Processing</h1>
	</div>
	<p class="First">The VISUAL Allocation Utility can be used to perform 
	 allocations in two modes: by part and by warehouse. Allocation by 
	 part commits supply to demand irrespective of warehouse; allocation 
	 by warehouse commits supply to demand from the same warehouse.</p>
