<h2>Ln Closed Short</h2>
<p>If the reference line can be shipped without fulfilling the total requested 
 order quantity, you can close the line <span class="Bold">short</span>. 
 You can check the box to close the line short. If this box is not checked, 
 the line is not closed until the requested order is reached.</p>
