	</div>
	<p class="First">You can renumber the items in the line item table.

	 of the remaining lines.</p>
	<p class="Normal-Indent">Select <span class="Bold">Renumber Lines</span> 
	 from the Edit menu.</p>
	<p class="Normal-Indent">VISUAL renumbers the lines.</p>
