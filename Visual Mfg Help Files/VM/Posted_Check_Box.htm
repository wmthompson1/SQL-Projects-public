<h2>Posted Check Box</h2>
<p>After a transaction is posted to the general ledger, VISUAL selects 
 the Posted check box. You cannot clear this check box after VISUAL has 
 selected it.</p>
<p>VISUAL prohibits modifications to posted transactions without first 
 <a href="Redistributing_WIP_Transactions.htm">redistributing transactions</a>.</p>
