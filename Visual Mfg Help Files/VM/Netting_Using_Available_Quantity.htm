	<p class="First">Select <span class="Bold">Net Using Availability Qty</span> 
	 from the <span class="Bold">View</span> menu to deduct On Hold quantities 
	 from the On Hand quantity used to initiate netting. If you select 
	 this option, VISUAL considers all material that is on hold to be unavailable 
	 to netting.</p>
