		<h1>Capacity Constrained Resource (CCR)</h1>
	</div>
	<p>A capacity constrained resource is a resource that you plan to use 
	 as close to 100% as possible. Though a few companies may have more 
	 than one CCR, typically there is only one. To protect the CCR, create 
	 buffers.</p>
