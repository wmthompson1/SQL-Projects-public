		<h1>What is VISUAL Search?</h1>
	</div>
	<p>You can use the VISUAL search bar to search for any alphanumeric 
	 text in your database. The system returns a list of all records that 
	 contain your search terms. In some cases, you can then double-click 
	 an item in the list to open the record.</p>
