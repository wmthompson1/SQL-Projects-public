<h2>Obsolete Part</h2>
<p>Select the Obsolete check box to make this part obsolete, or locked 
 in inventory. Only parts with no outstanding transactions are eligible 
 for this status. Click <a href="Classifying_a_Part_as_Obsolete_.htm">here</a> 
 for more information.</p>
