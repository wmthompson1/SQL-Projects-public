<h1>Deleting Timing Information</h1>
</div>
<p>To delete the contents of the Show Timing dialog box:</p>
<ol>
	<li class="p-Numbered"><p class="Numbered">Select <span class="Bold">Admin</span>, 
	 <span class="Bold">Show Timing</span>.</p></li>
	<li class="p-Numbered"><p class="Numbered">Click <span class="Bold">Purge</span>.</p></li>
	<li class="p-Numbered"><p class="Numbered">In the confirmation dialog 
	 box, click <span class="Bold">Yes</span>. The timing records are deleted. 
	 </p></li>
</ol>
