		<h1>Removing Programs from Headings</h1>
	</div>
	<p class="First">To remove a program from a heading:</p>
	<ol>
		<li class="p-Numbered"><p class="Numbered">Open the Maintain Menu 
		 window and select the Heading and Name you want to remove.</p></li>
		<li class="p-Numbered"><p class="Numbered">In the section where 
		 you want to remove the program, click the <span class="Bold">Delete</span> 
		 button.</p></li>
		<li class="p-Numbered"><p class="Numbered">Click the <span class="Bold">Save</span> 
		 button.</p></li>
	</ol>
