	<p class="First">When using Review Counts, the number of sub-tags appears 
	 for each tag. This indicates the number of lots or serial numbers 
	 of this part in this location.</p>
	<p>You CANNOT modify counts for sub-tags using Review Counts. You must 
	 use the Enter Recounts function.</p>
