		<h1>Stopping the Retrieval of Query Results</h1>
	</div>
	<p class="First">Retrieving query results can be a long process. To 
	 stop the process, click the <span class="Bold">Abort</span> button.</p>
	<p>While your results are being retrieved, the <span class="Bold">Abort</span> 
	 button is displayed along with a count of the number of matching items 
	 found thus far.</p>
