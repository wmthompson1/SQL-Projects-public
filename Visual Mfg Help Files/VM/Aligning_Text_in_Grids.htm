		<h1>Aligning Text in Grids</h1>
	</div>
	<p>You can align text on a column-by-column basis. To align the text 
	 in the column, right-click the column header. Select Alignment, then 
	 select <span class="Bold">Right</span>, <span class="Bold">Center</span>, 
	 or <span class="Bold">Left</span>.</p>
