	<div id="banner">
		<h1>Clearing Personal Menu Settings</h1>
	</div>
	<p class="First">To remove all groups and commands from your Personal 
	 Menu:</p>
	<ol>
		<li class="p-Numbered"><p class="Numbered">Select <span class="Bold">File</span>, 
		 <span class="Bold">Personal Menu</span> from the main VISUAL menu.</p></li>
		<li class="p-Numbered"><p class="Numbered">Right-click and select 
		 <span class="Bold">Customize</span>.</p></li>
		<li class="p-Numbered"><p class="Numbered">Click <span class="Bold">Clear</span>. 
		 All groups and commands are deleted from the menu.</p></li>
		<li class="p-Numbered"><p class="Numbered">Click <span class="Bold">Ok</span>.</p></li>
	</ol>
</div>
