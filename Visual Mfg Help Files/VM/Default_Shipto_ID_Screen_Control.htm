<h2>Default Shipto ID</h2>
<p class="First">Click the <span class="Bold">Default Shipto ID</span> 
 button to select a default Shipto ID for this customer. Unless specified 
 otherwise, VISUAL uses this default ID for all shipments to this customer.

 on adding shipping addresses to a customer record.</p>
