		<h1>Receiving Returned Materials to an Evaluation RMA</h1>
	</div>
	<p>When you receive the returned materials for evaluation, no inventory 
	 transactions are created. Since the customer still owns the returned 
	 materials, you do not receive the returned materials into your inventory.</p>
	<p>See <a href="Receiving_a_Returned_Shipment.htm">Receiving Returned 
	 Materials</a>.</p>
