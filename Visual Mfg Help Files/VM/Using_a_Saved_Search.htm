		<h1>Using a Saved Search</h1>
	</div>
	<p>To use a <a href="Saving_Search_Profiles.htm">saved search</a>:</p>
	<ol>
		<li class="p-Numbered"><p class="Numbered">In the advance browse 
		 dialog, select <span class="Bold">Profile</span>, <span class="Bold">Open</span>.</p></li>
		<li class="p-Numbered"><p class="Numbered">Click the <span class="Bold">Filter/View</span> 
		 arrow and select the saved search you want to use.</p></li>
		<li class="p-Numbered"><p class="Numbered">Click <span class="Bold">OK</span>. 
		 The dialog box closes and the advanced browse is filtered based 
		 on the profile criteria.</p></li>
	</ol>
